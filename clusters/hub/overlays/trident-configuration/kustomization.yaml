apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: netapp-trident

resources:
- ../../../../components/trident-configuration
- ./ontap-san.yaml

patches:
- target:
    group: trident.netapp.io
    version: v1
    kind: TridentBackendConfig
    name: ontap-nas
  patch: |-
    - op: replace
      path: /spec/storagePrefix
      value: hub

