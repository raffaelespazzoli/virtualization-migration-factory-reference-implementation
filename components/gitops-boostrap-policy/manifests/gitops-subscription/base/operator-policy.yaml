object-templates-raw: |
{{  if not lookup "policy.open-cluster-management.io/v1beta1" "OperatorPolicy" "openshift-gitops-operator" "open-cluster-management-policies" }}
apiVersion: policy.open-cluster-management.io/v1beta1
kind: OperatorPolicy
metadata:
  name: openshift-gitops-operator
  namespace: open-cluster-management-policies
spec:
  upgradeApproval: Automatic
  complianceConfig:
    catalogSourceUnhealthy: Compliant
    deploymentsUnavailable: NonCompliant
    upgradesAvailable: Compliant
  complianceType: musthave
  remediationAction: enforce
  removalBehavior:
    clusterServiceVersions: Delete
    customResourceDefinitions: Keep
    operatorGroups: DeleteIfUnused
    subscriptions: Delete
  severity: medium
  subscription:
    channel: latest
    name: openshift-gitops-operator
    namespace: kuadrant-system
    source: redhat-operators
    sourceNamespace: openshift-marketplace
    startingCSV: {{hub (lookup "policy.open-cluster-management.io/v1beta1" "OperatorPolicy" "openshift-gitops-operator" "open-cluster-management-policies").spec.subscription.startingCSV | default "openshift-gitops-operator.v1.20.4" hub}}  
    config:
      env:
      - name: ARGOCD_CLUSTER_CONFIG_NAMESPACES
        value: openshift-gitops    
  versions: 
    - {{hub (lookup "policy.open-cluster-management.io/v1beta1" "OperatorPolicy" "openshift-gitops-operator" "open-cluster-management-policies").spec.subscription.startingCSV | default "openshift-gitops-operator.v1.20.4" hub}}