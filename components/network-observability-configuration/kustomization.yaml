apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: netobserv

resources:
  - ./namespace.yaml
  - ./flow-collector.yaml
  - ./secret.yaml
  - ./loki.yaml  
  - ./loki-tenant-route.yaml
  - ./rbac.yaml


helmCharts:
  - name: tenant
    repo: https://operator.min.io
    releaseName: loki
    namespace: netobserv
    valuesFile: values.yaml      